name: CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt

      - name: Django system check
        working-directory: app
        run: python manage.py check

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop django-app || true
            docker rm django-app || true
            docker run -d \
              --name django-app \
              --restart unless-stopped \
              -p 80:8000 \
              -e DJANGO_ALLOWED_HOSTS="*" \
              -e APP_VERSION="${{ github.sha }}" \
              -e GIT_COMMIT="${{ github.sha }}" \
              -e DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              ${{ env.IMAGE_NAME }}:latest

      - name: Wait for health check
        run: |
          for i in {1..10}; do
            if curl -fs http://${{ secrets.AZURE_VM_HOST }}/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed"
          exit 1

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "✅ Deploy succeeded — commit ${{ github.sha }} is live on the Azure VM."}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "❌ Deploy failed for commit ${{ github.sha }}. Check the Actions log."}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
